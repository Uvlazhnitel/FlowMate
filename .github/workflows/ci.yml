name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55
        env:
          POSTGRES_DB: flowmate_test
          POSTGRES_USER: flowmate_test
          POSTGRES_PASSWORD: flowmate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowmate_test -d flowmate_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      APP_DEBUG: false
      APP_API_KEY: ci-test-secret
      DATABASE_URL: postgresql+asyncpg://flowmate_test:flowmate_test@localhost:5432/flowmate_test
      TEST_DATABASE_URL: postgresql+asyncpg://flowmate_test:flowmate_test@localhost:5432/flowmate_test
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - run: uv sync --frozen --group dev
      - run: uv run alembic upgrade head
      - run: make check
