name: flowmate

x-app: &app
  image: flowmate-app:local
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: false
  environment:
    APP_HOST: ${APP_HOST:-0.0.0.0}
    APP_PORT: 8000
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowmate}
      POSTGRES_USER: ${POSTGRES_USER:-flowmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default:
        aliases: ["db"]

  api:
    <<: *app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os, urllib.request; urllib.request.urlopen(f"http://127.0.0.1:{os.environ['APP_PORT']}/health/live", timeout=2)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - target: 8000
        published: ${API_HOST_PORT:-8000}
        host_ip: ${FLOWMATE_BIND_ADDRESS:-0.0.0.0}
        protocol: tcp

  web:
    image: flowmate-web:local
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - target: 8080
        published: ${WEB_PORT:-8080}
        host_ip: ${WEB_BIND_HOST:-0.0.0.0}
        protocol: tcp
    restart: unless-stopped

  bot:
    <<: *app
    profiles: ["bot"]
    command: ["python", "-m", "flowmate.bot"]
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  scheduler:
    <<: *app
    profiles: ["scheduler"]
    command: ["python", "-m", "flowmate.scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
