name: flowmate

x-app: &app
  image: flowmate-app:local
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: false
  environment:
    APP_HOST: ${APP_HOST:-0.0.0.0}
    APP_PORT: ${APP_PORT:-8000}
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowmate}
      POSTGRES_USER: ${POSTGRES_USER:-flowmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default:
        aliases: ["db"]

  api:
    <<: *app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os, urllib.request; urllib.request.urlopen(f"http://127.0.0.1:{os.environ['APP_PORT']}/health/live", timeout=2)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"

  bot:
    <<: *app
    profiles: ["bot"]
    command: ["python", "-m", "flowmate.bot"]
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
